[project]
name     = "r-bioconductor"
version  = "1.0.0"
channels = ["https://repo.prefix.dev/conda-forge", "https://repo.prefix.dev/bioconda"]
platforms = ["linux-64"]

[dependencies]
r-base                  = ">=4.3,<4.5"

[pypi-dependencies]

[feature.default.dependencies]
bioconductor-dada2      = ">=1.30"
bioconductor-phyloseq   = ">=1.46"
bioconductor-microbiome = ">=1.24"
bioconductor-genomeinfodb = "*"
bioconductor-genomeinfodbdata = "*" 
